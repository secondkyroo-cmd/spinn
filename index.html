<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
  <title>Spinning Wheel Hadiah | Admin Panel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(145deg, #1a1e2b 0%, #2a2f3f 100%);
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      max-width: 1300px;
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 48px;
      padding: 30px 35px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.15);
      display: flex;
      flex-wrap: wrap;
      gap: 35px;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .wheel-section {
      flex: 1 1 500px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 25px;
    }
    canvas {
      width: 100%;
      max-width: 480px;
      height: auto;
      aspect-ratio: 1/1;
      display: block;
      border-radius: 50%;
      background: #222738;
      box-shadow: 0 20px 35px rgba(0,0,0,0.7), 0 0 0 6px rgba(255,215,0,0.3), 0 0 0 12px rgba(0,0,0,0.4);
      transition: box-shadow 0.2s ease;
    }
    canvas:active {
      box-shadow: 0 20px 35px rgba(0,0,0,0.8), 0 0 0 6px #fbbf24, 0 0 0 12px #1e1e2f;
    }
    .spin-btn {
      background: #fbbf24;
      border: none;
      color: #0f172a;
      font-weight: 800;
      font-size: 1.8rem;
      letter-spacing: 2px;
      padding: 18px 45px;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 12px 25px rgba(251, 191, 36, 0.5), 0 4px 0 #b45309;
      transition: all 0.15s ease;
      text-transform: uppercase;
      margin-top: 10px;
      border: 1px solid #ffd966;
    }
    .spin-btn:active {
      transform: translateY(3px);
      box-shadow: 0 8px 15px rgba(251, 191, 36, 0.7), 0 2px 0 #92400e;
    }
    .spin-btn:disabled {
      opacity: 0.6;
      transform: translateY(3px);
      box-shadow: 0 5px 10px rgba(0,0,0,0.4);
      pointer-events: none;
      filter: grayscale(0.2);
    }
    .admin-panel {
      flex: 1 1 450px;
      background: rgba(20, 25, 35, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 40px;
      padding: 25px 25px;
      color: #e2e8f0;
      box-shadow: inset 0 0 15px rgba(0,0,0,0.6), 0 20px 35px rgba(0,0,0,0.7);
      border: 1px solid rgba(255, 255, 255, 0.25);
      max-height: 650px;
      overflow-y: auto;
    }
    .admin-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #fcd34d;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 2px dashed #fbbf24;
      padding-bottom: 10px;
    }
    .prize-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 25px;
    }
    .prize-item {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 12px 16px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      border: 1px solid rgba(255, 215, 0, 0.3);
      transition: 0.2s;
    }
    .prize-item input {
      background: #1e293b;
      border: 1px solid #475569;
      color: white;
      padding: 10px 12px;
      border-radius: 30px;
      font-size: 0.9rem;
      outline: none;
      transition: 0.2s;
      flex: 1 1 100px;
    }
    .prize-item input:focus {
      border-color: #fbbf24;
      box-shadow: 0 0 10px #fbbf24;
    }
    .prize-item .win-rate-input {
      max-width: 80px;
      text-align: center;
    }
    .remove-btn {
      background: #b91c1c;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 30px;
      padding: 8px 16px;
      cursor: pointer;
      background: #dc2626;
      transition: 0.2s;
      font-size: 0.9rem;
    }
    .remove-btn:hover {
      background: #ef4444;
    }
    .add-prize-btn {
      background: #2563eb;
      border: none;
      color: white;
      font-weight: bold;
      padding: 14px 24px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.2s;
      background: #3b82f6;
      box-shadow: 0 6px 14px rgba(59,130,246,0.4);
      margin-right: 10px;
    }
    .duration-setting {
      display: flex;
      align-items: center;
      gap: 20px;
      margin: 20px 0 15px;
      flex-wrap: wrap;
    }
    .duration-setting label {
      font-weight: 600;
      color: #cbd5e1;
    }
    .duration-setting input {
      width: 90px;
      padding: 12px;
      border-radius: 30px;
      background: #1e293b;
      border: 1px solid #475569;
      color: white;
      text-align: center;
    }
    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }
    .update-btn {
      background: #f59e0b;
      border: none;
      font-weight: bold;
      padding: 14px 28px;
      border-radius: 40px;
      cursor: pointer;
      color: #0f172a;
      background: #fbbf24;
      box-shadow: 0 4px 10px rgba(251,191,36,0.5);
    }
    .note {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 15px;
    }
    hr {
      border-color: rgba(255,255,255,0.15);
      margin: 18px 0;
    }
    /* alert custom */
    .custom-alert {
      position: fixed;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #0f172a;
      border: 2px solid #fbbf24;
      color: #fcd34d;
      padding: 18px 40px;
      border-radius: 50px;
      font-weight: bold;
      font-size: 1.5rem;
      box-shadow: 0 15px 30px rgba(0,0,0,0.7);
      z-index: 999;
      backdrop-filter: blur(12px);
      background: rgba(15, 23, 42, 0.9);
      display: flex;
      align-items: center;
      gap: 12px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="wheel-section">
    <canvas id="wheelCanvas" width="500" height="500"></canvas>
    <button id="spinButton" class="spin-btn">🎡 PUTAR</button>
    <div style="color:#ccc; margin-top:5px;">Klik tombol untuk memutar</div>
  </div>

  <div class="admin-panel">
    <div class="admin-title">⚙️ Panel Admin Hadiah</div>
    <div id="prizeContainer" class="prize-list">
      <!-- prize inputs akan di render javascript -->
    </div>
    <button id="addPrizeBtn" class="add-prize-btn">➕ Tambah Hadiah</button>
    
    <div class="duration-setting">
      <label>⏱️ Durasi Putar (detik):</label>
      <input type="number" id="durationInput" value="4" min="1" max="15" step="0.5">
    </div>
    
    <div style="margin: 10px 0; color: #fbbf24; font-weight: 500;">
      💡 Win rate menentukan peluang (jumlah relatif). Total win rate otomatis diskalakan.
    </div>
    
    <div class="action-row">
      <button id="updateWheelBtn" class="update-btn">🔄 Perbarui Wheel</button>
    </div>
    <div class="note">
      * Semakin banyak hadiah, ruang di wheel semakin kecil. Win rate lebih tinggi = sektor lebih besar.
    </div>
    <hr>
    <div style="color:#a5b4fc;">🎯 Klik "Perbarui Wheel" setelah mengubah data.</div>
  </div>
</div>

<script>
  (function() {
    // Data state
    let prizes = [
      { name: "1000Diamond", winRate: 1 },
      { name: "500Diamond", winRate: 1 },
      { name: "10.000Line", winRate: 25 },
      { name: "200Line", winRate: 90 },
      { name: "500Line", winRate: 90 },
      { name: "1.000Line", winRate: 50 }
    ];

    let spinDuration = 4; // detik

    // Canvas & context
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinButton');
    const prizeContainer = document.getElementById('prizeContainer');
    const addPrizeBtn = document.getElementById('addPrizeBtn');
    const updateWheelBtn = document.getElementById('updateWheelBtn');
    const durationInput = document.getElementById('durationInput');

    // Wheel state
    let currentRotation = 0;        // radian
    let isSpinning = false;
    let animationId = null;
    let spinStartTime = 0;
    let targetStopAngle = 0;       // sudut akhir setelah spin
    let spinStartAngle = 0;
    
    // Untuk perhitungan sektor berdasarkan winRate
    function getAnglesFromPrizes(prizeList) {
      const totalRate = prizeList.reduce((sum, p) => sum + p.winRate, 0);
      if (totalRate <= 0) return []; 
      let cumulative = 0;
      return prizeList.map(p => {
        const angle = (p.winRate / totalRate) * Math.PI * 2;
        const start = cumulative;
        cumulative += angle;
        return { ...p, startAngle: start, endAngle: cumulative, angle };
      });
    }

    // Menggambar wheel
    function drawWheel(rotationOffset = 0) {
      const width = canvas.width;
      const height = canvas.height;
      ctx.clearRect(0, 0, width, height);
      
      const centerX = width / 2;
      const centerY = height / 2;
      const radius = width / 2 - 8;
      
      if (prizes.length === 0) {
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, 0, Math.PI*2);
        ctx.fillStyle = "#2d3748";
        ctx.fill();
        ctx.strokeStyle = "#fbbf24";
        ctx.lineWidth = 4;
        ctx.stroke();
        ctx.fillStyle = "white";
        ctx.font = "bold 18px 'Segoe UI'";
        ctx.textAlign = "center";
        ctx.fillText("Tidak ada hadiah", centerX, centerY);
        return;
      }

      const sectors = getAnglesFromPrizes(prizes);
      if (sectors.length === 0) return;

      const colors = [
        "#f59e0b", "#3b82f6", "#10b981", "#ef4444", "#8b5cf6", "#ec4899", 
        "#f97316", "#06b6d4", "#84cc16", "#f43f5e", "#6366f1", "#14b8a6"
      ];

      sectors.forEach((sector, index) => {
        const start = sector.startAngle + rotationOffset;
        const end = sector.endAngle + rotationOffset;
        
        // Gambar sektor
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, start, end);
        ctx.closePath();
        
        ctx.fillStyle = colors[index % colors.length];
        ctx.fill();
        ctx.strokeStyle = "#1e1e2f";
        ctx.lineWidth = 3;
        ctx.stroke();

        // Teks hadiah
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(start + (end - start) / 2); // tengah sektor
        ctx.textAlign = "right";
        ctx.fillStyle = "#0f172a";
        ctx.font = "bold 14px 'Segoe UI', sans-serif";
        const text = sector.name.length > 14 ? sector.name.substring(0,13)+"…" : sector.name;
        ctx.fillText(text, radius - 18, 6);
        ctx.restore();
      });

      // Lingkaran tengah
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius * 0.12, 0, 2*Math.PI);
      ctx.fillStyle = "#fbbf24";
      ctx.fill();
      ctx.strokeStyle = "#0f172a";
      ctx.lineWidth = 3;
      ctx.stroke();
      
      // Penanda panah (statis di atas)
      ctx.beginPath();
      ctx.moveTo(centerX + radius + 5, centerY);
      ctx.lineTo(centerX + radius - 12, centerY - 10);
      ctx.lineTo(centerX + radius - 12, centerY + 10);
      ctx.closePath();
      ctx.fillStyle = "#fcd34d";
      ctx.shadowColor = "#000";
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
    }

    // Fungsi dapatkan hadiah berdasarkan sudut saat ini (rotation adalah offset)
    function getPrizeByAngle(rotation) {
      if (prizes.length === 0) return null;
      const sectors = getAnglesFromPrizes(prizes);
      // Normalisasi sudut ke 0 - 2pi. Penanda di posisi 0 radian (kanan) 
      // Kita hitung sudut penanda = 0 (atau 2pi). Mencari sektor yang mengandung sudut 0 setelah rotasi.
      // angle efektif = (2*Math.PI - (rotation % (2*Math.PI))) % (2*Math.PI)
      let rawAngle = (2 * Math.PI - (rotation % (2 * Math.PI))) % (2 * Math.PI);
      // Cari sektor
      for (let sector of sectors) {
        if (rawAngle >= sector.startAngle && rawAngle < sector.endAngle) {
          return sector.name;
        }
      }
      // Fallback (karena floating point)
      return sectors[sectors.length-1]?.name || "Tidak diketahui";
    }

    // Animasi spin
    function startSpin() {
      if (isSpinning) return;
      if (prizes.length === 0) {
        alert("Tambahkan minimal 1 hadiah terlebih dahulu.");
        return;
      }
      
      // Tentukan target random berdasarkan win rate
      const sectors = getAnglesFromPrizes(prizes);
      const totalRate = prizes.reduce((s, p) => s + p.winRate, 0);
      let rand = Math.random() * totalRate;
      let chosenIndex = 0;
      let cumulative = 0;
      for (let i = 0; i < prizes.length; i++) {
        cumulative += prizes[i].winRate;
        if (rand <= cumulative) {
          chosenIndex = i;
          break;
        }
      }
      
      // Target: kita ingin penunjuk berada di dalam sektor terpilih.
      const targetSector = sectors[chosenIndex];
      // Pilih sudut acak di dalam sektor tersebut (relatif terhadap 0 penanda)
      const randomAngleInSector = targetSector.startAngle + Math.random() * (targetSector.endAngle - targetSector.startAngle);
      
      // Konversi ke rotation offset: rotation = (2pi - targetAngle) mod 2pi
      let targetRotation = (2 * Math.PI - randomAngleInSector) % (2 * Math.PI);
      
      // Tambahkan putaran penuh agar dramatis (minimal 5 putaran + acak)
      const extraTurns = 5 + Math.floor(Math.random() * 3);
      targetRotation += extraTurns * 2 * Math.PI;
      
      spinStartAngle = currentRotation;
      targetStopAngle = targetRotation;
      spinStartTime = performance.now();
      isSpinning = true;
      spinBtn.disabled = true;
      
      if (animationId) cancelAnimationFrame(animationId);
      animateSpin();
    }

    function animateSpin(now = performance.now()) {
      if (!isSpinning) return;
      
      const elapsed = (now - spinStartTime) / 1000; // detik
      const duration = spinDuration;
      
      if (elapsed >= duration) {
        // Selesai
        currentRotation = targetStopAngle % (2 * Math.PI);
        drawWheel(currentRotation);
        isSpinning = false;
        spinBtn.disabled = false;
        animationId = null;
        
        // Tampilkan alert hadiah
        const prizeName = getPrizeByAngle(currentRotation);
        showAlert(`🎉 Selamat! Anda mendapatkan: ${prizeName || '?'}`);
        return;
      }
      
      // Easing out cubic
      const progress = elapsed / duration;
      const eased = 1 - Math.pow(1 - progress, 3);
      currentRotation = spinStartAngle + (targetStopAngle - spinStartAngle) * eased;
      drawWheel(currentRotation);
      
      animationId = requestAnimationFrame(animateSpin);
    }

    function showAlert(message) {
      const existing = document.querySelector('.custom-alert');
      if (existing) existing.remove();
      const alertDiv = document.createElement('div');
      alertDiv.className = 'custom-alert';
      alertDiv.innerHTML = `✨ ${message}`;
      document.body.appendChild(alertDiv);
      setTimeout(() => {
        if (alertDiv) alertDiv.remove();
      }, 3200);
    }

    // Render input hadiah di panel
    function renderPrizeInputs() {
      if (!prizeContainer) return;
      prizeContainer.innerHTML = '';
      prizes.forEach((prize, index) => {
        const div = document.createElement('div');
        div.className = 'prize-item';
        div.innerHTML = `
          <input type="text" placeholder="Nama hadiah" value="${escapeHtml(prize.name)}" data-index="${index}" class="prize-name-input">
          <input type="number" value="${prize.winRate}" min="0.1" step="0.5" class="win-rate-input" data-index="${index}" placeholder="Win rate">
          <button class="remove-btn" data-index="${index}">🗑️</button>
        `;
        prizeContainer.appendChild(div);
      });

      // Event listeners untuk input
      document.querySelectorAll('.prize-name-input').forEach(input => {
        input.addEventListener('input', function(e) {
          const idx = parseInt(this.dataset.index);
          if (!isNaN(idx) && prizes[idx]) {
            prizes[idx].name = this.value || "Tanpa Nama";
          }
        });
      });
      
      document.querySelectorAll('.win-rate-input').forEach(input => {
        input.addEventListener('input', function(e) {
          const idx = parseInt(this.dataset.index);
          let val = parseFloat(this.value);
          if (isNaN(val) || val < 0.1) val = 0.1;
          if (idx >= 0 && idx < prizes.length) {
            prizes[idx].winRate = val;
            this.value = val;
          }
        });
      });

      document.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          const idx = parseInt(this.dataset.index);
          if (!isNaN(idx) && prizes.length > 1) {
            prizes.splice(idx, 1);
            renderPrizeInputs();
            drawWheel(currentRotation);
          } else if (prizes.length <= 1) {
            alert("Minimal harus ada 1 hadiah.");
          }
        });
      });
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '"') return '&quot;';
        return m;
      });
    }

    // Update wheel dari state terkini
    function refreshWheelFromState() {
      drawWheel(currentRotation);
    }

    // Sinkronisasi durasi
    durationInput.addEventListener('input', function() {
      let val = parseFloat(this.value);
      if (isNaN(val) || val < 1) val = 1;
      if (val > 15) val = 15;
      spinDuration = val;
      this.value = val;
    });

    // Tombol tambah hadiah
    addPrizeBtn.addEventListener('click', () => {
      prizes.push({ name: "Hadiah Baru", winRate: 10 });
      renderPrizeInputs();
      drawWheel(currentRotation);
    });

    // Tombol perbarui wheel
    updateWheelBtn.addEventListener('click', () => {
      // Validasi semua input sudah sinkron (sudah terikat via event)
      renderPrizeInputs(); // pastikan UI fresh
      drawWheel(currentRotation);
      showAlert("✅ Wheel diperbarui dengan data terbaru!");
    });

    // Spin button
    spinBtn.addEventListener('click', startSpin);

    // Inisialisasi
    function initialRender() {
      durationInput.value = spinDuration;
      renderPrizeInputs();
      drawWheel(currentRotation);
    }

    initialRender();

    // Jika ukuran window berubah, redraw (opsional)
    window.addEventListener('resize', () => {
      drawWheel(currentRotation);
    });

  })();
</script>
</body>
</html>
